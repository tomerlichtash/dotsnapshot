# =============================================================================
# Snapshot Configuration File
# =============================================================================
# This file contains configuration settings for the snapshot system.
# You can customize these settings to match your preferences.

# =============================================================================
# Directory Configuration
# =============================================================================

# Snapshot target directory
# Can be relative to project root or absolute path
# Default: .snapshot
# Relative examples: .snapshots, snapshots, .backups, etc.
# Absolute examples: /tmp/snapshots, /Users/username/backups, /var/snapshots, etc.
# Can be overridden by setting SNAPSHOT_TARGET_DIR_ENV environment variable
DSNP_SNAPSHOT_TARGET_DIR=".snapshots"

# =============================================================================
# Backup Configuration
# =============================================================================

# Backup retention period in days
# Default: 30
# Can be overridden by setting DSNP_BACKUP_RETENTION_DAYS_ENV environment variable
DSNP_BACKUP_RETENTION_DAYS=30

# =============================================================================
# Logging Configuration
# =============================================================================

# Logs directory
# Can be relative to project root or absolute path
# Default: .logs
# Relative examples: .logs, logs, etc.
# Absolute examples: /tmp/logs, /var/log/snapshots, etc.
# Can be overridden by setting DSNP_LOGS_DIR_ENV environment variable
DSNP_LOGS_DIR=".logs"

# =============================================================================
# Machine Configuration
# =============================================================================

# Whether to use machine-specific directories
# Default: true (recommended for multi-machine setups)
# Can be overridden by setting DSNP_USE_MACHINE_DIRECTORIES_ENV environment variable
# Valid values: true, false
DSNP_USE_MACHINE_DIRECTORIES=true